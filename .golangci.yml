version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
  exclusions:
    rules:
      # adapter.go files shell out to external binaries; unused function warnings
      # for helpers like snapshotCount() are expected during initial scaffolding.
      - path: "backends/.*/adapter.go"
        linters: [unused, unparam]
      # Test helpers intentionally use _ assignments.
      - path: "tests/"
        linters: [errcheck]
      # hooks.go uses UTF-8 arrows in doc comments; gofmt version skew between
      # local and CI can produce false positives on comment formatting.
      - path: "core/hooks/hooks.go"
        linters: [gofmt, goimports]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/penguins-immutable-framework
